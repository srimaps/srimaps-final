spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/srimaps_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Colombo
spring.datasource.username=root
